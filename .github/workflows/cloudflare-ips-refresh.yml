name: Refresh Cloudflare IPs in WAFv2

# Cloudflare publishes the canonical IP ranges for its edge at
# https://www.cloudflare.com/ips-v4/ and /ips-v6/. These lists change
# over time as Cloudflare adds edge capacity; when they do, the WAFv2
# IPSets we use to restrict api.resqd.ai to CF-only traffic start
# rejecting legitimate requests from new ranges. This workflow keeps
# the IPSets in sync.
#
# Related advisory: LIVE-12 (2026-04-10). Without this job, the
# WAFv2 belt on top of the RESQD Lambda becomes a liability instead
# of a safety net. See docs/LIVE-12-runbook.md step 14 for the
# one-time setup.
#
# GRACEFUL DEGRADATION (2026-04-11). WAFv2 cannot currently be
# attached to the resqd-api HTTP API — AWS WAFv2 only supports REST
# APIs (v1), not HTTP APIs (v2). Until Kevin picks an architectural
# path (REST API migration, CloudFront in front, or defer), the two
# IPSets this workflow maintains do not exist. Rather than fail
# loudly every morning at 10:00 UTC, the first step below does a
# preflight check: if either the AWS credentials or the IPSets are
# missing, the job exits cleanly with a clear warning, and the
# remaining steps are skipped. When WAFv2 is eventually wired up
# and the IPSets re-created under the names below, this workflow
# auto-resumes with no code change.

on:
  schedule:
    # Daily at 10:00 UTC — well after Cloudflare's typical update windows.
    - cron: "0 10 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: cloudflare-ips-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      IPV4_IPSET_NAME: cloudflare-ipv4
      IPV6_IPSET_NAME: cloudflare-ipv6
    steps:
      - name: Preflight — check credentials and IPSets
        id: preflight
        run: |
          set -uo pipefail
          reason=""
          # If the repo secrets aren't set, the aws CLI would crash
          # with NoCredentialProviders. Detect early.
          if [[ -z "${AWS_ACCESS_KEY_ID:-}" || -z "${AWS_SECRET_ACCESS_KEY:-}" || -z "${AWS_REGION:-}" ]]; then
            reason="AWS credentials not configured (repo secrets missing)"
          else
            # Credentials present. Check that both IPSets actually
            # exist. If either is missing, treat this as expected
            # "WAFv2 not yet wired up" state and skip the refresh.
            V4=$(aws wafv2 list-ip-sets --scope REGIONAL --region "$AWS_REGION" \
              --query "IPSets[?Name=='$IPV4_IPSET_NAME'].Id" --output text 2>/dev/null || echo "")
            V6=$(aws wafv2 list-ip-sets --scope REGIONAL --region "$AWS_REGION" \
              --query "IPSets[?Name=='$IPV6_IPSET_NAME'].Id" --output text 2>/dev/null || echo "")
            if [[ -z "$V4" || -z "$V6" ]]; then
              reason="WAFv2 IPSets '$IPV4_IPSET_NAME' and/or '$IPV6_IPSET_NAME' do not exist"
            else
              echo "v4_id=$V4" >> "$GITHUB_OUTPUT"
              echo "v6_id=$V6" >> "$GITHUB_OUTPUT"
            fi
          fi

          if [[ -n "$reason" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=$reason" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping refresh — $reason. See docs/LIVE-12-runbook.md and project_live12.md for the WAFv2 architectural decision."
            {
              echo "## Cloudflare IPs refresh — SKIPPED"
              echo ""
              echo "Reason: $reason."
              echo ""
              echo "This workflow auto-resumes once the WAFv2 IPSets"
              echo "'\`$IPV4_IPSET_NAME\`' and '\`$IPV6_IPSET_NAME\`' exist in"
              echo "the $AWS_REGION region. See \`docs/LIVE-12-runbook.md\` for setup."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch canonical Cloudflare IP lists
        if: steps.preflight.outputs.skip != 'true'
        run: |
          set -euo pipefail
          curl -fsS https://www.cloudflare.com/ips-v4/ -o /tmp/cf-ipv4.txt
          curl -fsS https://www.cloudflare.com/ips-v6/ -o /tmp/cf-ipv6.txt
          # Sanity: each list must be non-empty and parseable CIDRs only.
          test -s /tmp/cf-ipv4.txt
          test -s /tmp/cf-ipv6.txt
          grep -Eq '^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$' /tmp/cf-ipv4.txt
          grep -Eq '^[0-9a-fA-F:]+/[0-9]{1,3}$'               /tmp/cf-ipv6.txt
          echo "ipv4 entries: $(wc -l </tmp/cf-ipv4.txt)"
          echo "ipv6 entries: $(wc -l </tmp/cf-ipv6.txt)"

      - name: Update cloudflare-ipv4
        if: steps.preflight.outputs.skip != 'true'
        run: |
          set -euo pipefail
          LOCK=$(aws wafv2 get-ip-set --scope REGIONAL --region "$AWS_REGION" \
            --name "$IPV4_IPSET_NAME" --id "${{ steps.preflight.outputs.v4_id }}" \
            --query LockToken --output text)
          ADDRS=$(jq -R -s 'split("\n") | map(select(length > 0))' /tmp/cf-ipv4.txt)
          aws wafv2 update-ip-set --scope REGIONAL --region "$AWS_REGION" \
            --name "$IPV4_IPSET_NAME" --id "${{ steps.preflight.outputs.v4_id }}" \
            --lock-token "$LOCK" \
            --addresses "$ADDRS"

      - name: Update cloudflare-ipv6
        if: steps.preflight.outputs.skip != 'true'
        run: |
          set -euo pipefail
          LOCK=$(aws wafv2 get-ip-set --scope REGIONAL --region "$AWS_REGION" \
            --name "$IPV6_IPSET_NAME" --id "${{ steps.preflight.outputs.v6_id }}" \
            --query LockToken --output text)
          ADDRS=$(jq -R -s 'split("\n") | map(select(length > 0))' /tmp/cf-ipv6.txt)
          aws wafv2 update-ip-set --scope REGIONAL --region "$AWS_REGION" \
            --name "$IPV6_IPSET_NAME" --id "${{ steps.preflight.outputs.v6_id }}" \
            --lock-token "$LOCK" \
            --addresses "$ADDRS"

      - name: Diff summary
        if: steps.preflight.outputs.skip != 'true'
        run: |
          set -euo pipefail
          V4_COUNT=$(wc -l </tmp/cf-ipv4.txt)
          V6_COUNT=$(wc -l </tmp/cf-ipv6.txt)
          {
            echo "## Cloudflare IPs refreshed"
            echo ""
            echo "| Set              | Entries |"
            echo "|------------------|---------|"
            echo "| cloudflare-ipv4  | $V4_COUNT |"
            echo "| cloudflare-ipv6  | $V6_COUNT |"
          } >> "$GITHUB_STEP_SUMMARY"
